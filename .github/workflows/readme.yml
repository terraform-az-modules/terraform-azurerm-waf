name: Readme Workflow

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
           token: ${{ secrets.GITHUB }}

      - name: Clone genie
        run: |
          git clone https://${{ secrets.GITHUB }}@github.com/terraform-az-modules/genie.git /home/runner/genie

      - name: Setup environment
        run: |
          sudo apt-get update
          sudo apt-get install -y make curl tar

      - name: Install terraform-docs
        run: |
          set -euo pipefail
          TFD_VERSION="v0.19.0"
          ARCH="$(uname -m)"
          case "$ARCH" in
            x86_64) ARCH="amd64" ;;
            aarch64|arm64) ARCH="arm64" ;;
            *) echo "Unsupported arch: $ARCH" ; exit 1 ;;
          esac
          URL="https://github.com/terraform-docs/terraform-docs/releases/download/${TFD_VERSION}/terraform-docs-${TFD_VERSION}-linux-${ARCH}.tar.gz"
          curl -fSL --retry 3 --retry-delay 2 "$URL" -o /tmp/terraform-docs.tgz
          # Validate we actually downloaded a gzip tarball (helps diagnose 404/rate-limit HTML pages)
          if ! tar -tzf /tmp/terraform-docs.tgz >/dev/null 2>&1; then
            echo "Downloaded file is not a valid .tar.gz from $URL"
            echo "--- first 40 lines of downloaded content ---"
            head -n 40 /tmp/terraform-docs.tgz || true
            exit 1
          fi
          tar -xzf /tmp/terraform-docs.tgz -C /tmp
          sudo install -m 0755 /tmp/terraform-docs /usr/local/bin/terraform-docs
          terraform-docs version

      - name: Generate README
        run: |
          export TERM=xterm-256color
          mkdir -p docs
          terraform-docs md . --hide providers --hide requirements > docs/io.md
          make readme GENIE_PATH=/home/runner/genie

      - name: Commit and push changes
        run: |
          git config --global url."https://${{ secrets.GITHUB }}@github.com/".insteadOf "https://github.com/"
          git config --global user.name "clouddrove-ci"
          git config --global user.email "c84795582+clouddrove-ci@users.noreply.github.com"

          git add README.md docs/io.md

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "docs: update README"

            git remote set-url origin https://clouddrove-ci:${{ secrets.GITHUB }}@github.com/${{ github.repository }}

            git push origin HEAD:${{ github.ref_name }}
          fi

